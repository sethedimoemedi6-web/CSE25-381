 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Academy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
 <style>
  /* ===== NAVBAR ===== */
.navbar.bg-dark {
  background-color: #0d0d0d !important;
  border-bottom: 1px solid var(--orange);
  padding: 0.5rem 1.5rem;
}


/* NAV LINKS LEFT — ARTICLE BUTTON STYLE */
.navbar-collapse .navbar-nav {
  flex-direction: row !important;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-left: 1.5rem !important;
}

.nav-box {
  background: var(--card-bg) !important;
  border: 1px solid var(--card-border) !important;
  border-top: 2px solid var(--orange) !important;
  border-radius: 5px !important;
  padding: 0.3rem 0.9rem !important;
  margin: 0 !important;
  color: var(--white) !important;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.25s, border-color 0.25s, color 0.25s;
}

.nav-box:hover {
  background: rgba(255, 107, 0, 0.08) !important;
  border-color: var(--orange) !important;
  color: var(--orange) !important;
}

.nav-box::after {
  display: none !important;
}

/* ===== HERO SECTION ===== */
.hero-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 58vh;
  max-width: 1100px;
  margin: 3rem auto 0;
  padding: 0 1.5rem;
  gap: 2rem;
  align-items: center;
}

.hero-left {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.hero-label {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 700;
  text-align:center;
  color: var(--orange);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  animation: fadeSlideDown 0.7s ease both;
}

.hero-title {
  text-align:left;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--white);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.05;
  
  animation: fadeSlideDown 0.7s 0.1s ease both;
}

.hero-subtitle {
  font-family: 'Orbitron', monospace;
  font-weight: 700;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  color: var(--orange);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.3;
  margin: 0;
  animation: fadeSlideDown 0.7s 0.2s ease both;
}

.hero-right {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  border-top: 3px solid var(--orange);
  background: var(--card-bg);
  animation: fadeSlideDown 0.7s 0.3s ease both;
}



/* ===== NAVBAR ===== */
.navbar.bg-dark {
  background-color: #0d0d0d !important;
  border-bottom: 1px solid var(--orange);
  padding: 0.5rem 1.5rem;
}

/* LOGO CIRCLE */
.logo-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid var(--orange);
  overflow: hidden;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  flex-shrink: 0;
  transition: box-shadow 0.3s ease;
}

.logo-circle:hover {
  box-shadow: 0 0 16px rgba(255, 107, 0, 0.5);
}

.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

/* ===== NAV LINKS — PLAIN TEXT LEFT ===== */
.navbar-collapse .navbar-nav {
  flex-direction: row !important;
  flex-wrap: wrap;
  gap: 0;
  margin-left: 2rem !important;
}

.nav-link {
  font-family: 'Rajdhani', sans-serif !important;
  font-weight: 600 !important;
  font-size: 0.78rem !important;
  color: var(--white-dim) !important;
  letter-spacing: 0.18em !important;
  text-transform: uppercase !important;
  padding: 0.5rem 1.2rem !important;
  background: none !important;
  border: none !important;
  border-radius: 0 !important;
  transition: color 0.2s ease !important;
}

.nav-link:hover {
  color: var(--orange) !important;
  background: none !important;
  border: none !important;
}

.nav-link::after {
  display: none !important;
}
 </style>
</head>
<body>

  <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
    <div class="container-fluid">

      <a class="navbar-brand logo-circle" href="">
        <img src="images/logo.png.avif" alt="logo">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link nav-box" href="syllabus.html">Syllabus</a></li>
          <li class="nav-item"><a class="nav-link nav-box" href="faq.html">FAQs</a></li>
          <li class="nav-item"><a class="nav-link nav-box" href="quizzes.html">Quizzes</a></li>
          <li class="nav-item"><a class="nav-link nav-box" href="article.html">Articles</a></li>
          <li class="nav-item"><a class="nav-link nav-box" href="feedback.html">Feedback</a></li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- HERO -->
  <div class="hero-section">

    <div class="hero-left">
      <h1 class="hero-title">Crypto<br>Academy</h1>
      <span class="hero-label">Web3 Education Platform</span>
      <h2 class="hero-subtitle">Master The Future<br>Of Finance.</h2>
    </div>

    
  </div>

  <!-- TAGLINE BOX -->
  <div class="tagline-wrap">
    <div class="tagline-box">
      <p>Master the future of Finance. Join the millions of people building the future.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
